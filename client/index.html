    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AI Influencer Generator",
      "applicationCategory": "MultimediaApplication",

        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "10000",
        "bestRating": "5",
        "worstRating": "1"
      }

    <!-- Structured Data - WebSite for Sitelinks Search Box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AI Influencer Generator",
      "url": "https://aiinfluencer.ai",
      "potentialAction": {

        "target": "https://aiinfluencer.ai/search?q={search_term_string}",

      }
    }

    {
      "@context": "https://schema.org",

          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI Influencer Generator offers a free tier with 5 credits per month. Paid plans start at $9/month for 50 credits (Starter), $29/month for 300 credits (Pro), and $99/month for 1000 credits (Business). All paid plans include watermark-free images and commercial license."
